<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Задачи</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
    --accent: #c8f04a; --accent2: #7c6af7; --text: #f0f0f0;
    --muted: #888899; --border: rgba(255,255,255,0.08);
    --red: #ff5c5c; --yellow: #ffc94d; --green: #c8f04a; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Golos Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

  .header { padding: 20px 16px 0; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); }
  .pill { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; background: var(--accent); color: #0f0f13; }
  .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border-radius: 12px; padding: 12px; border: 1px solid var(--border); text-align: center; }
  .stat-num { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Golos Text', sans-serif; font-size: 13px; cursor: pointer; }
  .filter-btn.active { background: var(--accent); color: #0f0f13; border-color: var(--accent); font-weight: 600; }

  .section-title { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 16px; margin: 8px 0 10px; }
  .tasks-list { padding: 0 16px; }

  .task-card { background: var(--surface); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.2s; animation: slideIn 0.3s ease; }
  .task-card:active { border-color: var(--accent); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .task-card.done { opacity: 0.5; }
  .task-card.done .task-text { text-decoration: line-through; color: var(--muted); }
  .task-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .check-btn { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 12px; transition: all 0.2s; }
  .task-card.done .check-btn { background: var(--accent); border-color: var(--accent); color: #0f0f13; }
  .task-text { font-size: 14px; line-height: 1.5; flex: 1; font-weight: 500; }
  .task-arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
  .badge-who { background: rgba(124,106,247,0.2); color: #a99ef5; }
  .badge-urgent { background: rgba(255,92,92,0.15); color: var(--red); }
  .badge-important { background: rgba(255,201,77,0.15); color: var(--yellow); }
  .badge-normal { background: rgba(200,240,74,0.12); color: var(--green); }
  .badge-deadline { background: var(--surface2); color: var(--muted); }
  .badge-date { background: var(--surface2); color: var(--muted); }

  .alerts-section { padding: 0 16px; margin-bottom: 8px; }
  .alert-card { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.3); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; font-size: 13px; }

  /* ── CALENDAR ── */
  .calendar-wrap { padding: 0 16px 16px; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-month { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 600; }
  .cal-nav { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px 8px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { text-align: center; font-size: 10px; color: var(--muted); padding: 4px 0; font-weight: 600; text-transform: uppercase; }
  .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; position: relative; border: 1px solid transparent; transition: all 0.15s; }
  .cal-day:active { background: var(--surface2); }
  .cal-day.empty { cursor: default; }
  .cal-day.today { border-color: var(--accent); }
  .cal-day.selected { background: var(--accent); }
  .cal-day.selected .cal-num { color: #0f0f13; font-weight: 700; }
  .cal-day.has-tasks .cal-dot { display: block; }
  .cal-num { font-size: 13px; line-height: 1; }
  .cal-dot { display: none; width: 4px; height: 4px; border-radius: 50%; background: var(--accent2); margin-top: 2px; }
  .cal-day.selected .cal-dot { background: #0f0f13; }
  .cal-day.urgent-day .cal-dot { background: var(--red); }
  .cal-selected-label { font-size: 13px; color: var(--muted); margin: 12px 0 8px; font-weight: 500; }
  .cal-tasks { }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 8px 0 40px; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
  .modal-body { padding: 0 20px; }
  .modal-title { font-size: 17px; font-weight: 600; line-height: 1.4; margin-bottom: 16px; }
  .modal-section { margin-bottom: 20px; }
  .modal-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-bottom: 8px; }
  .modal-context { background: var(--surface2); border-radius: 12px; padding: 12px 14px; font-size: 14px; line-height: 1.6; color: var(--text); border-left: 3px solid var(--accent2); }
  .who-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .who-btn { padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: 'Golos Text', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.2s; }
  .who-btn.active { background: rgba(124,106,247,0.2); border-color: var(--accent2); color: #a99ef5; font-weight: 600; }
  .prio-grid { display: flex; gap: 8px; }
  .prio-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Golos Text', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
  .prio-btn[data-p="срочно"].active { background: rgba(255,92,92,0.15); border-color: var(--red); color: var(--red); }
  .prio-btn[data-p="важно"].active { background: rgba(255,201,77,0.15); border-color: var(--yellow); color: var(--yellow); }
  .prio-btn[data-p="обычно"].active { background: rgba(200,240,74,0.12); border-color: var(--green); color: var(--green); }
  .modal-actions { display: flex; gap: 8px; margin-top: 8px; }
  .btn-done { flex: 1; padding: 14px; background: var(--accent); color: #0f0f13; border: none; border-radius: var(--radius); font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }
  .btn-delete { padding: 14px 20px; background: rgba(255,92,92,0.1); color: var(--red); border: 1px solid rgba(255,92,92,0.3); border-radius: var(--radius); font-family: 'Golos Text', sans-serif; font-size: 14px; cursor: pointer; }
  .modal-deadline-row { display: flex; align-items: center; gap: 8px; background: var(--surface2); border-radius: 10px; padding: 10px 14px; font-size: 14px; color: var(--muted); }

  /* ── TEAM ── */
  .team-section { padding: 0 16px; }
  .member-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .member-row:last-child { border-bottom: none; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .member-info { flex: 1; }
  .member-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .member-count { font-size: 12px; color: var(--muted); }
  .member-bar-wrap { width: 80px; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .member-bar { height: 100%; background: var(--accent); border-radius: 2px; }

  /* ── ADD ── */
  .add-form { padding: 16px; }
  .add-form textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Golos Text', sans-serif; font-size: 14px; padding: 14px; resize: none; min-height: 100px; outline: none; }
  .add-form textarea:focus { border-color: var(--accent); }
  .add-btn { width: 100%; margin-top: 8px; padding: 14px; background: var(--accent); color: #0f0f13; border: none; border-radius: var(--radius); font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .add-btn:disabled { opacity: 0.5; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #0f0f13; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── DAY MODAL ── */
  .day-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 90; display: none; align-items: flex-end; }
  .day-modal-overlay.open { display: flex; }
  .day-modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 8px 0 40px; width: 100%; max-height: 80vh; overflow-y: auto; animation: slideUp 0.3s ease; }
  .day-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px 16px; }
  .day-modal-title { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 600; }
  .day-modal-close { background: var(--surface2); border: none; color: var(--muted); font-size: 18px; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .day-modal-tasks { padding: 0 16px; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 8px 0 20px; z-index: 20; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--muted); font-family: 'Golos Text', sans-serif; font-size: 10px; cursor: pointer; padding: 6px 0; }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); line-height: 1.8; }
  .tab { display: none; }
  .tab.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">ЗАДАЧИ</div>
    <span class="pill" id="activeCount">0 активных</span>
  </div>
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-num" id="statTotal" style="color:var(--accent)">0</div><div class="stat-label">Всего</div></div>
    <div class="stat-card"><div class="stat-num" id="statDone" style="color:var(--accent2)">0</div><div class="stat-label">Готово</div></div>
    <div class="stat-card"><div class="stat-num" id="statUrgent" style="color:var(--red)">0</div><div class="stat-label">Срочных</div></div>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-f="all">Все</button>
    <button class="filter-btn" data-f="me">Мне</button>
    <button class="filter-btn" data-f="team">Команде</button>
    <button class="filter-btn" data-f="urgent">Срочные</button>
    <button class="filter-btn" data-f="done">Готово</button>
  </div>
</div>

<!-- TASKS TAB -->
<div id="tabTasks" class="tab active">
  <div id="alertsSection" class="alerts-section"></div>
  <div class="section-title" id="tasksLabel">Задачи</div>
  <div class="tasks-list" id="tasksList"></div>
</div>

<!-- CALENDAR TAB -->
<div id="tabCalendar" class="tab">
  <div class="calendar-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calPrev()">‹</button>
      <div class="cal-month" id="calMonth"></div>
      <button class="cal-nav" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-selected-label" id="calSelectedLabel"></div>
    <div class="cal-tasks" id="calTasks"></div>
  </div>
</div>

<!-- ADD TAB -->
<div id="tabAdd" class="tab">
  <div class="add-form">
    <div class="section-title" style="padding:0;margin-bottom:12px;">Новая задача</div>
    <textarea id="addText" placeholder="Опиши задачу или вставь сообщения из чата — ИИ разберёт сам..."></textarea>
    <button class="add-btn" id="addBtn" onclick="addTask()">
      <span id="addBtnText">Разобрать и добавить</span>
    </button>
  </div>
</div>

<!-- TEAM TAB -->
<div id="tabTeam" class="tab">
  <div class="section-title">Команда</div>
  <div class="team-section" id="teamSection"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-section" id="modalContextSection">
        <div class="modal-label">Из сообщения</div>
        <div class="modal-context" id="modalContext"></div>
      </div>
      <div class="modal-section">
        <div class="modal-label">Исполнитель</div>
        <div class="who-grid" id="modalWhoGrid"></div>
      </div>
      <div class="modal-section">
        <div class="modal-label">Приоритет</div>
        <div class="prio-grid">
          <button class="prio-btn" data-p="срочно" onclick="setModalPrio('срочно')">🔴 Срочно</button>
          <button class="prio-btn" data-p="важно" onclick="setModalPrio('важно')">🟡 Важно</button>
          <button class="prio-btn" data-p="обычно" onclick="setModalPrio('обычно')">🟢 Обычно</button>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-label">Срок</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="date" id="modalDeadlineInput"
            style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Golos Text',sans-serif;font-size:14px;padding:10px 14px;outline:none;"
            onchange="setModalDeadline(this.value)">
          <button onclick="setModalDeadline('')"
            style="background:rgba(255,92,92,0.1);border:1px solid rgba(255,92,92,0.3);color:var(--red);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:13px;">
            Убрать
          </button>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-label">Добавлено</div>
        <div style="font-size:13px;color:var(--muted)" id="modalCreated"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-done" id="modalDoneBtn" onclick="modalToggleDone()"></button>
        <button class="btn-delete" onclick="modalDelete()">🗑</button>
      </div>
    </div>
  </div>
</div>

<!-- DAY MODAL -->
<div class="day-modal-overlay" id="dayModalOverlay" onclick="closeDayModal(event)">
  <div class="day-modal">
    <div class="modal-handle"></div>
    <div class="day-modal-header">
      <div class="day-modal-title" id="dayModalTitle"></div>
      <button class="day-modal-close" onclick="document.getElementById('dayModalOverlay').classList.remove('open')">✕</button>
    </div>
    <div class="day-modal-tasks" id="dayModalTasks"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="navTasks" onclick="switchTab('Tasks')"><span class="nav-icon">📋</span>Задачи</button>
  <button class="nav-btn" id="navCalendar" onclick="switchTab('Calendar')"><span class="nav-icon">📅</span>Календарь</button>
  <button class="nav-btn" id="navAdd" onclick="switchTab('Add')"><span class="nav-icon">➕</span>Добавить</button>
  <button class="nav-btn" id="navTeam" onclick="switchTab('Team')"><span class="nav-icon">👥</span>Команда</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const SERVER = "https://varvaraassistantbot.onrender.com";
const TEAM = ["Полина", "Аня", "Я (сам)"];
const MONTHS_RU = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const DAYS_RU = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

const urlParams = new URLSearchParams(window.location.search);
let chatId = parseInt(urlParams.get('id') || '0')
  || parseInt(tg?.initDataUnsafe?.user?.id || '0')
  || parseInt(localStorage.getItem('chatId') || '0');
if (chatId) localStorage.setItem('chatId', chatId);

let tasks = [];
let currentFilter = 'all';
let modalTaskId = null;
let calDate = new Date();
let calSelected = null;

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadTasks() {
  if (!chatId) return;
  try {
    const r = await fetch(`${SERVER}/tasks/${chatId}`);
    tasks = await r.json();
    renderTasks();
    if (modalTaskId) {
      const t = tasks.find(x => x.id === modalTaskId);
      if (t) fillModal(t);
    }
    renderCalendar();
  } catch(e) {}
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(name) {
  ['Tasks','Calendar','Add','Team'].forEach(t => {
    document.getElementById('tab'+t).classList.toggle('active', t === name);
    document.getElementById('nav'+t).classList.toggle('active', t === name);
  });
  if (name === 'Team') renderTeam();
  if (name === 'Tasks') loadTasks();
  if (name === 'Calendar') renderCalendar();
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.f;
  renderTasks();
});

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  document.getElementById('statTotal').textContent = tasks.length;
  document.getElementById('statDone').textContent = tasks.filter(t => t.done).length;
  document.getElementById('statUrgent').textContent = tasks.filter(t => t.priority === 'срочно' && !t.done).length;
  document.getElementById('activeCount').textContent = tasks.filter(t => !t.done).length + ' активных';
}

function renderAlerts() {
  const el = document.getElementById('alertsSection');
  const urgent = tasks.filter(t => !t.done && t.priority === 'срочно');
  el.innerHTML = urgent.map(t => `<div class="alert-card">🔴 <span><b>Срочно!</b> ${t.task} — ${t.who}</span></div>`).join('');
}

function getFiltered() {
  switch(currentFilter) {
    case 'me': return tasks.filter(t => t.who === 'Я (сам)');
    case 'team': return tasks.filter(t => t.who !== 'Я (сам)');
    case 'urgent': return tasks.filter(t => t.priority === 'срочно' && !t.done);
    case 'done': return tasks.filter(t => t.done);
    default: return tasks;
  }
}

function badgePrio(p) {
  if (p === 'срочно') return `<span class="badge badge-urgent">🔴 срочно</span>`;
  if (p === 'важно') return `<span class="badge badge-important">🟡 важно</span>`;
  return `<span class="badge badge-normal">🟢 обычно</span>`;
}

function renderTasks() {
  renderStats(); renderAlerts();
  const list = document.getElementById('tasksList');
  const filtered = getFiltered();
  document.getElementById('tasksLabel').textContent = `${filtered.length} задач`;
  if (!filtered.length) {
    list.innerHTML = `<div class="empty">📭<br><br>Задач нет.<br>Добавь через ➕ или напиши боту</div>`;
    return;
  }
  list.innerHTML = filtered.map(t => taskCardHTML(t)).join('');
}

function taskCardHTML(t) {
  return `<div class="task-card ${t.done ? 'done' : ''}" onclick="openModal(${t.id})">
    <div class="task-top">
      <button class="check-btn" onclick="event.stopPropagation();toggleTask(${t.id})">${t.done ? '✓' : ''}</button>
      <div class="task-text">${t.task}</div>
      <div class="task-arrow">›</div>
    </div>
    <div class="task-meta">
      <span class="badge badge-who">👤 ${t.who}</span>
      ${badgePrio(t.priority)}
      ${t.deadline ? `<span class="badge badge-deadline">📅 ${t.deadline}</span>` : ''}
      <span class="badge badge-date">${t.created || ''}</span>
    </div>
  </div>`;
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function parseDeadline(dl) {
  if (!dl) return null;
  const now = new Date();
  const year = now.getFullYear();
  const months = {
    'янв':0,'фев':1,'мар':2,'апр':3,'май':4,'июн':5,
    'июл':6,'авг':7,'сен':8,'окт':9,'ноя':10,'дек':11,
    'января':0,'февраля':1,'марта':2,'апреля':3,'мая':4,'июня':5,
    'июля':6,'августа':7,'сентября':8,'октября':9,'ноября':10,'декабря':11,
    'понедельник':null,'вторник':null,'среда':null,'четверг':null,'пятница':null,'суббота':null,'воскресенье':null,
    'пн':null,'вт':null,'ср':null,'чт':null,'пт':null,'сб':null,'вс':null,
  };
  const lower = dl.toLowerCase().trim();
  if (lower === 'сегодня') return new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (lower === 'завтра') { const d = new Date(now); d.setDate(d.getDate()+1); return d; }

  // "до пятницы" / "к пятнице"
  const weekdays = {'понедельник':1,'вторник':2,'среда':3,'четверг':4,'пятница':5,'суббота':6,'воскресенье':0,'пн':1,'вт':2,'ср':3,'чт':4,'пт':5,'сб':6,'вс':0};
  for (const [name, wd] of Object.entries(weekdays)) {
    if (lower.includes(name)) {
      const d = new Date(now);
      const cur = d.getDay();
      let diff = wd - cur;
      if (diff <= 0) diff += 7;
      d.setDate(d.getDate() + diff);
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }
  }

  // "20 марта" / "20.03"
  const dmMatch = lower.match(/(\d{1,2})[.\s](\d{1,2})/);
  if (dmMatch) return new Date(year, parseInt(dmMatch[2])-1, parseInt(dmMatch[1]));

  const wordMatch = lower.match(/(\d{1,2})\s+([а-яё]+)/);
  if (wordMatch) {
    const day = parseInt(wordMatch[1]);
    const mon = wordMatch[2].slice(0,3);
    for (const [key, val] of Object.entries(months)) {
      if (key.startsWith(mon) && val !== null) return new Date(year, val, day);
    }
  }
  return null;
}

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function renderCalendar() {
  const y = calDate.getFullYear();
  const m = calDate.getMonth();
  document.getElementById('calMonth').textContent = MONTHS_RU[m] + ' ' + y;

  const grid = document.getElementById('calGrid');
  const today = new Date();
  const todayKey = dateKey(today);

  // Build deadline map
  const deadlineMap = {};
  tasks.forEach(t => {
    if (!t.done && t.deadline) {
      const d = parseDeadline(t.deadline);
      if (d) {
        const k = dateKey(d);
        if (!deadlineMap[k]) deadlineMap[k] = [];
        deadlineMap[k].push(t);
      }
    }
  });

  // Days of week headers
  let html = DAYS_RU.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // First day of month (Mon=0)
  const firstDay = new Date(y, m, 1);
  let startDow = firstDay.getDay() - 1;
  if (startDow < 0) startDow = 6;

  // Empty cells
  for (let i = 0; i < startDow; i++) html += `<div class="cal-day empty"></div>`;

  const daysInMonth = new Date(y, m+1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const k = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isToday = k === todayKey;
    const isSel = calSelected === k;
    const hasTasks = !!deadlineMap[k];
    const hasUrgent = hasTasks && deadlineMap[k].some(t => t.priority === 'срочно');
    html += `<div class="cal-day ${isToday?'today':''} ${isSel?'selected':''} ${hasTasks?'has-tasks':''} ${hasUrgent?'urgent-day':''}" onclick="selectCalDay('${k}')">
      <span class="cal-num">${d}</span>
      <span class="cal-dot"></span>
    </div>`;
  }

  grid.innerHTML = html;
  renderCalSelected(deadlineMap);
}

function selectCalDay(key) {
  if (tg) tg.HapticFeedback?.selectionChanged();
  // Build deadline map
  const deadlineMap = {};
  tasks.forEach(t => {
    if (!t.done && t.deadline) {
      const d = parseDeadline(t.deadline);
      if (d) {
        const k = dateKey(d);
        if (!deadlineMap[k]) deadlineMap[k] = [];
        deadlineMap[k].push(t);
      }
    }
  });
  if (!deadlineMap[key] || !deadlineMap[key].length) return;
  const dayTasks = deadlineMap[key];
  const [y,m,d] = key.split('-');
  document.getElementById('dayModalTitle').textContent = parseInt(d) + ' ' + MONTHS_RU[parseInt(m)-1] + ' — ' + dayTasks.length + ' задач';
  document.getElementById('dayModalTasks').innerHTML = dayTasks.map(t => taskCardHTML(t)).join('');
  document.getElementById('dayModalOverlay').classList.add('open');
}

function closeDayModal(e) {
  if (e.target === document.getElementById('dayModalOverlay')) {
    document.getElementById('dayModalOverlay').classList.remove('open');
  }
}

function renderCalSelected(deadlineMap) {
  const label = document.getElementById('calSelectedLabel');
  const calTasksEl = document.getElementById('calTasks');
  label.textContent = Object.keys(deadlineMap).length ? 'Нажми на отмеченный день' : 'Задач с дедлайнами нет';
  calTasksEl.innerHTML = '';
}

function calPrev() {
  calDate.setMonth(calDate.getMonth() - 1);
  renderCalendar();
}

function calNext() {
  calDate.setMonth(calDate.getMonth() + 1);
  renderCalendar();
}

// ── Toggle / Delete ───────────────────────────────────────────────────────────
async function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  renderTasks(); renderCalendar();
  await fetch(`${SERVER}/tasks/${chatId}/${id}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({done: t.done})
  });
}

async function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  renderTasks(); renderCalendar();
  await fetch(`${SERVER}/tasks/${chatId}/${id}`, { method: 'DELETE' });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  modalTaskId = id;
  fillModal(t);
  document.getElementById('modalOverlay').classList.add('open');
  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function fillModal(t) {
  document.getElementById('modalTitle').textContent = t.task;
  const ctxSection = document.getElementById('modalContextSection');
  if (t.source) {
    document.getElementById('modalContext').textContent = '«' + t.source + '»';
    ctxSection.style.display = 'block';
  } else { ctxSection.style.display = 'none'; }
  document.getElementById('modalWhoGrid').innerHTML = TEAM.map(m =>
    `<button class="who-btn ${t.who===m?'active':''}" onclick="setModalWho('${m}')">${m}</button>`
  ).join('');
  document.querySelectorAll('.prio-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.p === t.priority));

  document.getElementById('modalCreated').textContent = t.created || '—';
  const dlInput = document.getElementById('modalDeadlineInput');
  if (t.deadline) {
    const d = parseDeadline(t.deadline);
    if (d) dlInput.value = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    else dlInput.value = '';
  } else { dlInput.value = ''; }
  document.getElementById('modalDoneBtn').textContent = t.done ? '↩ Вернуть в работу' : '✅ Отметить готовым';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
    modalTaskId = null;
  }
}

async function setModalWho(who) {
  const t = tasks.find(x => x.id === modalTaskId);
  if (!t) return;
  t.who = who; fillModal(t); renderTasks();
  await fetch(`${SERVER}/tasks/${chatId}/${modalTaskId}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({who})
  });
}

async function setModalDeadline(val) {
  const t = tasks.find(x => x.id === modalTaskId);
  if (!t) return;
  if (val) {
    const [y,m,d] = val.split('-');
    t.deadline = parseInt(d) + '.' + parseInt(m) + '.' + y;
  } else { t.deadline = null; }
  fillModal(t); renderTasks(); renderCalendar();
  await fetch(`${SERVER}/tasks/${chatId}/${modalTaskId}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({deadline: t.deadline})
  });
}

async function setModalPrio(priority) {
  const t = tasks.find(x => x.id === modalTaskId);
  if (!t) return;
  t.priority = priority; fillModal(t); renderTasks();
  await fetch(`${SERVER}/tasks/${chatId}/${modalTaskId}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({priority})
  });
}

async function modalToggleDone() {
  const t = tasks.find(x => x.id === modalTaskId);
  if (!t) return;
  t.done = !t.done; fillModal(t); renderTasks(); renderCalendar();
  document.getElementById('modalOverlay').classList.remove('open');
  await fetch(`${SERVER}/tasks/${chatId}/${modalTaskId}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({done: t.done})
  });
  if (tg) tg.HapticFeedback?.notificationOccurred('success');
}

async function modalDelete() {
  if (!modalTaskId) return;
  await deleteTask(modalTaskId);
  document.getElementById('modalOverlay').classList.remove('open');
  modalTaskId = null;
}

// ── Add task ──────────────────────────────────────────────────────────────────
async function addTask() {
  if (!chatId) return;
  const text = document.getElementById('addText').value.trim();
  if (!text) return;
  const btn = document.getElementById('addBtn');
  const btnText = document.getElementById('addBtnText');
  btn.disabled = true;
  btnText.innerHTML = '<div class="spinner"></div> Анализирую...';
  try {
    const r = await fetch(`${SERVER}/analyze/${chatId}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text})
    });
    const added = await r.json();
    tasks = [...added, ...tasks];
    document.getElementById('addText').value = '';
    switchTab('Tasks');
    renderTasks();
    if (tg) tg.HapticFeedback?.notificationOccurred('success');
  } catch(e) { alert('Ошибка: ' + e.message); }
  btn.disabled = false;
  btnText.textContent = 'Разобрать и добавить';
}

// ── Team ──────────────────────────────────────────────────────────────────────
function renderTeam() {
  const section = document.getElementById('teamSection');
  const maxTasks = Math.max(1, ...TEAM.map(m => tasks.filter(t => t.who === m && !t.done).length));
  section.innerHTML = TEAM.map(m => {
    const active = tasks.filter(t => t.who === m && !t.done).length;
    const done = tasks.filter(t => t.who === m && t.done).length;
    const initials = m === 'Я (сам)' ? 'Я' : m.slice(0,2).toUpperCase();
    const pct = Math.round((active / maxTasks) * 100);
    return `<div class="member-row">
      <div class="avatar">${initials}</div>
      <div class="member-info"><div class="member-name">${m}</div><div class="member-count">${active} активных · ${done} выполнено</div></div>
      <div class="member-bar-wrap"><div class="member-bar" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

loadTasks();
setInterval(loadTasks, 10000);
</script>
